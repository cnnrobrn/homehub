name: Deploy marketing

# Builds `@homehub/marketing` as a static Next.js export and ships it to
# Cloudflare Workers Static Assets. Runs only when files under
# `apps/marketing/**` change, so product PRs aren't slowed down and this
# job doesn't redeploy on unrelated pushes.
#
# Preview path (pull_request): builds + runs `wrangler versions upload`,
# which uploads a named version that does *not* take production traffic
# and returns a unique preview URL on the worker's `*.workers.dev`
# hostname. The URL is published as a PR comment by wrangler-action.
#
# Production path (push to main): builds + runs `wrangler deploy`, which
# promotes the new version to take all traffic on the configured
# routes / `*.workers.dev` URL.
#
# Required repo secrets:
#   - CLOUDFLARE_API_TOKEN   (scoped: Workers Scripts Edit,
#                             Account Settings Read,
#                             Workers Routes Edit,
#                             User Details Read)
#   - CLOUDFLARE_ACCOUNT_ID  (972180638c4d6814ed5d7e00fede2e1c)

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'
      - '.github/workflows/deploy-marketing.yml'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/marketing/**'
      - '.github/workflows/deploy-marketing.yml'
      - 'pnpm-lock.yaml'

concurrency:
  # Serialize deploys per-branch so a fast follow-up commit can't race
  # an in-flight deploy. `cancel-in-progress: false` on main means every
  # production commit actually ships.
  group: deploy-marketing-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20.18.0'
  # pnpm version is taken from the root package.json `packageManager`
  # field. pnpm/action-setup@v4 reads that automatically — specifying
  # `with.version` here would clash and fail with
  # "ERR_PNPM_BAD_PM_VERSION: Multiple versions of pnpm specified".
  # Evaluated once at workflow start. Used to skip the Cloudflare deploy
  # and preview steps when secrets are unavailable (fork PRs, secret
  # rotation). Without this gate, those steps fail with a non-interactive
  # wrangler error and the job goes red even though the build succeeded.
  HAS_CF_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    # Minimum permissions: wrangler-action needs `pull-requests: write`
    # to post the preview URL comment on PRs. No other write scopes.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        # `--filter @homehub/marketing...` installs only what the
        # marketing app and its transitive workspace deps need — no
        # reason to hydrate the full monorepo for this job.
        run: pnpm install --frozen-lockfile --filter @homehub/marketing...

      - name: Build (static export)
        run: pnpm --filter @homehub/marketing build

      - name: Deploy to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CF_SECRETS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/marketing
          command: deploy

      - name: Upload preview version
        if: github.event_name == 'pull_request' && env.HAS_CF_SECRETS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/marketing
          # `versions upload` stages a new version without routing
          # traffic to it — returns a preview URL of the form
          # `<version-tag>-homehub-marketing.connor-972.workers.dev`.
          command: versions upload --message "PR #${{ github.event.pull_request.number }} @ ${{ github.sha }}"

      - name: Skip deploy (no Cloudflare secrets)
        if: env.HAS_CF_SECRETS != 'true'
        run: |
          echo "::notice title=Skipped Cloudflare deploy::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not available in this context (fork PR or secret not configured). Build succeeded; deploy/preview intentionally skipped."
