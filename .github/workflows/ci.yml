name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node 20.19.0 is the minimum that satisfies rolldown's native-binding
  # engine constraint (`^20.19.0 || >=22.12.0`). Vitest 4 uses rolldown,
  # and pnpm silently skips installing optional deps whose `engines` the
  # current Node rejects — so older Node 20.x causes every vitest run to
  # die with "Cannot find native binding @rolldown/binding-<os>-<cpu>".
  # Still within the project's `<21` engines bound in package.json.
  NODE_VERSION: '20.19.0'
  # pnpm version is taken from the root package.json `packageManager`
  # field (pinned with integrity hash). pnpm/action-setup@v4 reads that
  # automatically — specifying `with.version` here would clash and fail
  # with "ERR_PNPM_BAD_PM_VERSION: Multiple versions of pnpm specified".
  # Pinned Supabase CLI version. Bump deliberately; a bump can change
  # migration linter behavior or bundled Postgres extension versions.
  SUPABASE_CLI_VERSION: '2.90.0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm -r --if-present run test

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

  log-field-lint:
    name: Log-field lint
    runs-on: ubuntu-latest
    # Enforces that workers emit through the structured logger rather
    # than bare `console.*`. See `scripts/lint-log-fields.ts`.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run log-field lint
        run: pnpm lint:log-fields

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    # CI runs `next build` for `@homehub/web` to catch compile-time
    # regressions (bad imports, RSC/client boundary violations, typed
    # routes). Real Supabase secrets are not available on CI, so the
    # `apps/web/src/lib/env.ts` schema relaxes to optional when
    # `NEXT_PHASE === 'phase-production-build'`. We pass empty strings
    # for the `NEXT_PUBLIC_*` vars so Next's inlining has a value to
    # embed; the build-phase opt-out handles the missing service-role
    # key. See `apps/web/README.md` for the full contract.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ''
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
      NEXT_PUBLIC_APP_URL: ''
      SUPABASE_SERVICE_ROLE_KEY: ''
      # Disable Next's anonymous usage telemetry on CI.
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        # `...@homehub/web` = web + all its transitive workspace deps,
        # built in topological order. Each workspace package's `build`
        # is `tsc`, which populates `dist/` so webpack's module
        # resolution (main/exports → dist/index.js) finds the entry.
        # Without this, `next build` fails with
        # "Module not found: Can't resolve '@homehub/shared'" etc.
        run: pnpm --filter "...@homehub/web" build

  nango-compose-validate:
    name: Nango compose validate
    runs-on: ubuntu-latest
    # Syntax-checks `infra/nango/docker-compose.yml` without booting the
    # stack. `docker compose config` parses the file, interpolates env
    # vars, and exits non-zero on schema / interpolation errors. Cheap
    # (no image pulls, no daemon work beyond parse) and catches the
    # class of drift that bit us in upstream Nango's compose churn.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        working-directory: infra/nango
        # NANGO_ENCRYPTION_KEY is required by the compose file (`:?`
        # fail-fast). Supply a dummy for parse-time only — the value
        # never leaves the validator.
        env:
          NANGO_ENCRYPTION_KEY: ci-placeholder-not-a-real-key
        run: docker compose -f docker-compose.yml config --quiet

  migration-lint:
    name: Migration lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        # Pinned via SUPABASE_CLI_VERSION above. The official .deb lives at
        # github.com/supabase/cli releases; install via curl + dpkg to avoid
        # a third-party action in the supply chain.
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/supabase.deb \
            "https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.deb"
          sudo dpkg -i /tmp/supabase.deb
          rm /tmp/supabase.deb
          supabase --version

      - name: Start local Supabase stack
        working-directory: packages/db
        # Docker is preinstalled on GitHub-hosted ubuntu-latest runners, so
        # `supabase start` can boot the full stack. Takes ~60-90s on an empty
        # schema; if this grows past ~2 minutes we fall back to a static
        # migration linter (squawk) — see packages/db/README.md.
        run: supabase start --ignore-health-check

      - name: Lint migrations
        working-directory: packages/db
        run: supabase db lint --local --level warning --fail-on warning

      - name: Stop local Supabase stack
        if: always()
        working-directory: packages/db
        run: supabase stop --no-backup || true

  rls-tests:
    name: RLS tests
    runs-on: ubuntu-latest
    # Runs the pgTAP-style RLS assertion suite in
    # `packages/db/tests/rls/` against a freshly-booted local stack.
    # Parallel with migration-lint (they share the same install pattern
    # but do not share state — each job gets its own runner).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Supabase CLI
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/supabase.deb \
            "https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.deb"
          sudo dpkg -i /tmp/supabase.deb
          rm /tmp/supabase.deb
          supabase --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase stack
        working-directory: packages/db
        # `supabase start` applies every migration under supabase/migrations
        # in order, so by the time it returns the schema is ready for tests.
        run: supabase start --ignore-health-check

      - name: Run RLS tests
        working-directory: packages/db
        # `db:test` loads _helpers.sql + _setup.sql and runs each
        # *_test.sql. Any assertion failure raises and psql exits non-zero.
        run: pnpm db:test

      - name: Stop local Supabase stack
        if: always()
        working-directory: packages/db
        run: supabase stop --no-backup || true
