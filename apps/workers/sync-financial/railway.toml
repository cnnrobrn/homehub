# Railway service config for @homehub/worker-sync-financial.

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[build.args]
SERVICE_NAME = "worker-sync-financial"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
