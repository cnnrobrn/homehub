# Railway service config for @homehub/worker-backup-export.

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[build.args]
SERVICE_NAME = "worker-backup-export"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
